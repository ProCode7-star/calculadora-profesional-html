<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora Profesional - Una calculadora web moderna y eficiente">
    <meta name="author" content="ProCode7-star">
    <title>Calculadora Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <!-- Encabezado -->
            <div class="header">
                <h1>Calculadora Profesional</h1>
                <p class="subtitle">Cálculos precisos y rápidos</p>
            </div>

            <!-- Pantalla de resultados -->
            <div class="display-container">
                <input 
                    type="text" 
                    id="display" 
                    class="display" 
                    readonly 
                    placeholder="0"
                    value="0"
                >
                <div class="history" id="history"></div>
            </div>

            <!-- Botones de control superior -->
            <div class="control-buttons">
                <button class="btn btn-control" id="btnClear">AC</button>
                <button class="btn btn-control" id="btnDelete">DEL</button>
                <button class="btn btn-control" id="btnPercent">%</button>
            </div>

            <!-- Teclado de números y operadores -->
            <div class="keyboard">
                <!-- Fila 1 -->
                <button class="btn btn-number" data-value="7">7</button>
                <button class="btn btn-number" data-value="8">8</button>
                <button class="btn btn-number" data-value="9">9</button>
                <button class="btn btn-operator" data-operator="/">÷</button>

                <!-- Fila 2 -->
                <button class="btn btn-number" data-value="4">4</button>
                <button class="btn btn-number" data-value="5">5</button>
                <button class="btn btn-number" data-value="6">6</button>
                <button class="btn btn-operator" data-operator="*">×</button>

                <!-- Fila 3 -->
                <button class="btn btn-number" data-value="1">1</button>
                <button class="btn btn-number" data-value="2">2</button>
                <button class="btn btn-number" data-value="3">3</button>
                <button class="btn btn-operator" data-operator="-">−</button>

                <!-- Fila 4 -->
                <button class="btn btn-number btn-zero" data-value="0">0</button>
                <button class="btn btn-number" data-value=".">.</button>
                <button class="btn btn-operator" data-operator="+">+</button>

                <!-- Fila 5 -->
                <button class="btn btn-equals" id="btnEquals">=</button>
            </div>

            <!-- Pie de página -->
            <div class="footer">
                <p>&copy; 2026 ProCode7-star | Calculadora Profesional</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
